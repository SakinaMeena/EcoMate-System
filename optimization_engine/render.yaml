services:
  - type: web
    name: ecomate-optimization-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: CRON_HOUR
        value: 20
      - key: CRON_MINUTE
        value: 0
      - key: USE_MOCK_DATA
        value: false
    healthCheckPath: /health
